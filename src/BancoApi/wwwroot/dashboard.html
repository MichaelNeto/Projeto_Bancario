<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <a href="index.html" class="logo">🏦 Banco</a>
        <nav class="nav-links">
          <ul style="list-style: none; display: flex; gap: 24px">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="minhas-chaves-pix.html">Chaves Pix</a></li>
            <li><a href="#extrato">Extrato</a></li>
            <li><a href="cadastro.html">Abrir Conta</a></li>
          </ul>
        </nav>
        <div class="nav-user">
          <div class="user-info">
            <span
              id="account-name"
              style="font-weight: 600; display: block; margin-bottom: 4px"
              >👤 Carregando...</span
            >
            <span id="account-number" style="font-size: 12px; opacity: 0.9"
              >Conta: --</span
            >
          </div>
          <button id="logout-btn" class="btn btn-danger">Sair</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container dashboard-container" id="dashboard">
        <!-- Saldo -->
        <div class="card saldo-card">
          <p class="saldo-label">Saldo Disponível</p>
          <p id="saldo">R$ 0,00</p>
        </div>

        <!-- Depósito -->
        <div class="card deposito-form-container">
          <h2 class="card-title">💰 Fazer Depósito</h2>

          <form id="deposito-form">
            <div class="form-group">
              <label for="valor-deposito">Valor a Depositar (R$)</label>
              <input
                type="number"
                id="valor-deposito"
                name="valor-deposito"
                step="0.01"
                min="0.01"
                placeholder="0,00"
                required
              />
              <small style="color: var(--gray-medium); margin-top: 4px">
                Digite o valor que deseja depositar em sua conta
              </small>
            </div>

            <button type="submit" class="btn btn-success w-full">
              Confirmar Depósito
            </button>
          </form>
        </div>

        <!-- PIX -->
        <div class="card pix-form-container">
          <h2 class="card-title">📤 Enviar PIX</h2>

          <form id="pix-form">
            <div class="form-row">
              <div class="form-group">
                <label for="chave-pix">Chave PIX</label>
                <input
                  type="text"
                  id="chave-pix"
                  name="chave-pix"
                  placeholder="Email, CPF, CNPJ ou Telefone"
                  required
                />
                <small style="color: var(--gray-medium); margin-top: 4px">
                  Chave do destinatário (Email, CPF, CNPJ, Telefone ou UUID)
                </small>
              </div>

              <div class="form-group">
                <label for="valor-pix">Valor (R$)</label>
                <input
                  type="number"
                  id="valor-pix"
                  name="valor-pix"
                  step="0.01"
                  min="0.01"
                  placeholder="0,00"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-secondary w-full">
              Enviar PIX
            </button>
          </form>
        </div>

        <!-- Extrato -->
        <div class="card">
          <h2 class="card-title" id="extrato">📋 Extrato</h2>

          <div id="extrato-list" class="extrato-list">
            <!-- Transações serão renderizadas aqui -->
            <p class="no-transactions">Carregando...</p>
          </div>
        </div>
      </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/deposito.js"></script>
    <script src="js/pix.js"></script>
  </body>
</html>
